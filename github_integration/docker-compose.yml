services:
  github-integration:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      # In Docker, localhost points to the container itself.
      # Override this if your Campaign API is hosted elsewhere.
      CAMPAIGN_API_BASE_URL: ${CAMPAIGN_API_BASE_URL:-http://host.docker.internal:8000}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
